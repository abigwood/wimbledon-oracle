name: Refresh official Wimbledon data

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wimbledon-data-refresh
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Pull official order of play and results
        run: python3 scripts/sync_official.py
      - name: Verify app and backend logic
        run: |
          python3 -m unittest -v test_app.py
          node --check app.js
          cd worker && npm test
      - name: Publish changed data
        run: |
          git config user.name "wimbledon-oracle-bot"
          git config user.email "actions@github.com"
          git add data/fixtures.json
          if git diff --cached --quiet; then
            echo "No official data change"
            exit 0
          fi
          git commit -m "data: refresh official Wimbledon information"
          git push
