<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#143D2B">
  <meta name="robots" content="noindex,nofollow">
  <title>SW19 Oracle - Closed</title>
  <meta name="description" content="SW19 Oracle has now closed after Wimbledon 2026.">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <style>
    :root {
      color-scheme: light;
      --green: #143d2b;
      --lime: #d7ff5f;
      --ink: #111713;
      --muted: #5d6b62;
      --line: #dfe7e1;
      --paper: #f8faf7;
      --white: #ffffff;
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      display: grid;
      place-items: center;
      padding: 28px;
      background:
        linear-gradient(135deg, rgba(20, 61, 43, 0.08), rgba(215, 255, 95, 0.16)),
        var(--paper);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    main {
      width: min(100%, 620px);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--white);
      padding: clamp(28px, 7vw, 52px);
      box-shadow: 0 18px 50px rgba(17, 23, 19, 0.10);
    }

    .mark {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: var(--green);
      color: var(--lime);
      font-weight: 800;
      letter-spacing: 0;
      margin-bottom: 26px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(32px, 8vw, 54px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.55;
    }

    .status {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid var(--line);
      color: var(--green);
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <main>
    <div class="mark" aria-hidden="true">SW</div>
    <h1>SW19 Oracle is closed.</h1>
    <p>Thanks for playing through Wimbledon 2026. The live prediction game and league service have now been decommissioned while Prem Oracle moves forward.</p>
    <div class="status">Tournament complete</div>
  </main>
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.getRegistrations()
        .then((registrations) => Promise.all(registrations.map((registration) => registration.unregister())))
        .catch(() => {});
    }
    if ("caches" in window) {
      caches.keys()
        .then((keys) => Promise.all(keys.filter((key) => key.startsWith("wimbledon-oracle")).map((key) => caches.delete(key))))
        .catch(() => {});
    }
  </script>
</body>
</html>
