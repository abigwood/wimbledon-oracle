<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#143D2B">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="SW19 Oracle">
  <title>SW19 Oracle — 2026 Predictor</title>
  <meta name="description" content="Predict the set scores at Wimbledon 2026: eight featured matches per day until the round of 16, then every singles match.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="stylesheet" href="styles.css?v=20260629h">
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">SW</span>
      <div>
        <strong>SW19 Oracle</strong>
        <span>2026 set-score predictor</span>
      </div>
    </div>
    <button class="profile-button" id="profileButton" type="button" aria-label="Set player name">
      <span id="profileInitial">A</span>
    </button>
  </header>

  <main id="app" tabindex="-1"></main>

  <nav class="bottom-nav" aria-label="Main navigation">
    <button class="active" type="button" data-view="today"><span>🎾</span>Today</button>
    <button type="button" data-view="schedule"><span>🗓️</span>Schedule</button>
    <button type="button" data-view="picks"><span>🔮</span>My Picks</button>
    <button type="button" data-view="league"><span>🏆</span>League</button>
    <button type="button" data-view="rules"><span>📋</span>Rules</button>
  </nav>

  <dialog id="profileDialog">
    <form method="dialog" id="profileForm">
      <div class="dialog-head">
        <div>
          <span class="eyebrow">Player profile</span>
          <h2>What should we call you?</h2>
        </div>
        <button class="icon-button" value="cancel" aria-label="Close">×</button>
      </div>
      <label for="playerName">Display name</label>
      <input id="playerName" maxlength="24" autocomplete="nickname" placeholder="Adam">
      <button class="primary wide" value="save">Save name</button>
    </form>
  </dialog>

  <script>window.WIM_API = "https://wimbledon-oracle-window.abigwood.workers.dev";</script>
  <script src="app.js?v=20260629h" defer></script>
</body>
</html>
